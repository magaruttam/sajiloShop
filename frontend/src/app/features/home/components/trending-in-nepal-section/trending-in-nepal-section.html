<section class="mx-auto max-w-[1300px] px-4 md:px-8 py-10">
  <!-- Section Header -->
  <div class="flex items-end justify-between mb-8">
    <div>
      <h2 class="text-[#1A365D] text-2xl md:text-3xl font-extrabold tracking-tight">
        Trending in Nepal
      </h2>
    </div>
    <a
      href="#"
      class="hidden md:flex items-center gap-1 text-sm font-semibold text-[#13696A] hover:underline shrink-0"
    >
      See More <span class="material-symbols-outlined text-base">arrow_forward</span>
    </a>
  </div>

  <!-- Product Grid -->
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
    @for (product of trendingProducts; track product.id) {
      <app-product-card
        [image]="product.image"
        [name]="product.name"
        [subtitle]="product.subtitle"
        [price]="product.price"
        [badge]="product.badge"
      />
    }
  </div>

  <!-- Mobile See More -->
  <div class="flex justify-center mt-6 md:hidden">
    <a
      href="#"
      class="flex items-center gap-1 text-sm font-semibold text-[#13696A] border border-[#13696A] px-5 py-2 rounded hover:bg-[#E6F4F4] transition-colors"
    >
      See More <span class="material-symbols-outlined text-base">arrow_forward</span>
    </a>
  </div>
</section>
