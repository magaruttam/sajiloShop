<div class="max-w-[1300px] mx-auto px-4 md:px-8 mt-4">
  <h1 class="text-[#002045] text-2xl font-extrabold mb-7 font-inter">Just For You</h1>
   <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 overflow-x-auto">
    @for (item of pairings; track item.name) {
       <app-product-card [image]="item.image" [name]="item.name" [subtitle]="item.subtitle" [price]="item.price" [routerLink]="['/product-detail']"></app-product-card>
    }
   </div>
    <div class="button flex justify-center ">
      <button class="text-[#002045] text-center mb-4 font-semibold text-sm border border-[#002045] py-2 px-4 rounded hidden lg:block font-inter">
      Load More
    </button>
    </div>
</div>
