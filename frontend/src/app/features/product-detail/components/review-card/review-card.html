<div class="bg-white border border-[#E5E9EB] rounded-lg p-4 space-y-2">
  <div class="flex items-start justify-between">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-full bg-[#1A365D] text-white flex items-center justify-center text-xs font-bold">
        {{ review().initials }}
      </div>
      <div>
        <p class="font-semibold text-sm text-[#1A365D]">{{ review().name }}</p>
        @if (review().verified) {
          <span class="text-[10px] text-[#13696A] font-medium bg-[#E6F7F7] px-2 py-0.5 rounded-full">✓ VERIFIED PURCHASE</span>
        }
      </div>
    </div>
    <div class="flex flex-col items-end gap-1">
      <app-star-rating [rating]="review().rating" />
      <span class="text-xs text-[#43474E]">{{ review().timeAgo }}</span>
    </div>
  </div>
  <p class="text-sm text-[#43474E]">"{{ review().comment }}"</p>
</div>
