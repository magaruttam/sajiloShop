<article class="bg-white border border-[#E5E9EB] rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow duration-200 flex flex-col">
  <!-- Image container with fixed aspect ratio -->
  <div class="w-full aspect-square bg-[#F7FAFC] overflow-hidden">
    <img [src]="image()" [alt]="name()" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300" />
  </div>

  <!-- Content -->
  <div class="px-3 py-3 flex flex-col gap-1 flex-1">
    <h3 class="text-[#1A365D] text-sm font-semibold leading-tight line-clamp-2">{{ name() }}</h3>
    @if (subtitle()) {
      <p class="text-[#43474E] text-xs leading-snug line-clamp-1">{{ subtitle() }}</p>
    }
    <div class="mt-auto pt-2 flex items-baseline gap-2">
      <span class="text-[#13696A] font-bold text-base">{{ price() }}</span>
      @if (discount()) {
        <span class="text-[#C4C6CF] text-xs line-through">{{ discount() }}</span>
      }
    </div>
  </div>
</article>
