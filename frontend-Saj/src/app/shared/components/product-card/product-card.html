<article
  (click)="navigateToProduct($event)"
  class="relative group bg-[#F7FAFC] border border-[#E5E9EB] rounded overflow-hidden cursor-pointer"
>
  <!-- Badge -->
  @if (badge()) {
    <span
      class="absolute top-2 left-2 z-10 text-white text-[9px] font-bold px-2 py-0.5 rounded uppercase tracking-wide"
      [ngClass]="badgeColor()"
    >
      {{ badge() }}
    </span>
  }

  <!-- Favorite -->
  <button
    (click)="toggleFavorite($event)"
    class="absolute top-2 right-2 z-10 bg-white rounded-full w-7 h-7 flex items-center justify-center shadow"
  >
    <span
      class="material-symbols-outlined text-base"
      [class.text-red-500]="isFavorite()"
      [class.text-[#43474E]]="!isFavorite()"
    >
      favorite
    </span>
  </button>

  <!-- Image -->
  <figure class="h-44 w-full overflow-hidden m-0">
    <img
      [src]="displayImage()"
      [alt]="name()"
      class="w-full h-full object-fill group-hover:scale-105 transition-transform duration-300"
    />
  </figure>

  <!-- Info -->
  <div class="px-3 py-2">
    @if (subtitle()) {
      <p class="text-[9px] font-bold tracking-widest text-[#43474E] uppercase">{{ subtitle() }}</p>
    }
    <h3 class="text-[#1A365D] font-semibold text-sm mt-0.5 leading-snug">{{ name() }}</h3>
    <div class="flex items-baseline gap-2 mt-1">
      <span class="text-[#1A365D] font-bold text-sm">{{ price() }}</span>
      @if (discount()) {
        <span class="text-[#C4C6CF] text-xs line-through">{{ discount() }}</span>
      }
    </div>
  </div>
</article>
