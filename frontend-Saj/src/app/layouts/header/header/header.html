<header
  #header
  class="bg-[#F8FAFC] sticky top-0 left-0 w-full transition-transform duration-300 shadow-md z-20"
>
  <div class="w-full max-w-[1300px] flex flex-col py-4 mx-auto px-4 md:px-8">
    <!-- Top Row -->
    <div class="flex items-center justify-between">
      <!-- Left: Hamburger + Logo + Nav -->
      <div class="flex items-center gap-6">
        <!-- Hamburger (mobile only) -->
        <button
          (click)="mobileMenuOpen = !mobileMenuOpen"
          class="lg:hidden p-1 text-[#43474E] hover:text-[#1A365D] transition-colors"
          aria-label="Toggle menu"
        >
          <span class="material-symbols-outlined">{{ mobileMenuOpen ? 'close' : 'menu' }}</span>
        </button>

        <!-- Logo -->
        <figure>
          <img
            src="/images/logo-sajilo.png"
            alt="Sajilo Shop Logo"
            class="h-10 cursor-pointer"
            routerLink="/"
          />
        </figure>

        <!-- Desktop Nav -->
        <nav class="hidden lg:block">
          <ul class="flex gap-8 text-[#64748B] text-sm">
            <li><a routerLink="/" class="hover:text-[#1A365D] transition-colors">Home</a></li>
            <li>
              <a routerLink="/become-a-seller" class="hover:text-[#1A365D] transition-colors"
                >Become a Seller</a
              >
            </li>
            <li>
              <a routerLink="/aboutus" class="hover:text-[#1A365D] transition-colors">About Us</a>
            </li>
            <li>
              <a routerLink="/contactus" class="hover:text-[#1A365D] transition-colors"
                >Contact Us</a
              >
            </li>
          </ul>
        </nav>
      </div>

      <!-- Right: Search + Icons -->
      <div class="flex items-center gap-4">
        <app-search-box class="max-w-md w-full hidden lg:block" />

        <button
          aria-label="Shopping Bag"
          [routerLink]="['/cart']"
          class="text-[#43474E] hover:text-[#1A365D] transition-colors"
        >
          <span class="material-symbols-outlined">shopping_bag</span>
        </button>

        <!-- Login button / User profile -->
        @if (auth.isLoggedIn()) {
          <!-- User avatar dropdown -->
          <div class="relative">
            <button
              (click)="userDropdownOpen = !userDropdownOpen"
              class="flex items-center gap-2 hover:opacity-80 transition-opacity"
            >
              <div class="w-8 h-8 rounded-full bg-[#1A365D] text-white flex items-center justify-center text-sm font-bold">
                {{ auth.name().charAt(0).toUpperCase() }}
              </div>
              <span class="hidden lg:block text-sm font-semibold text-[#1A365D]">{{ auth.name() }}</span>
              <span class="material-symbols-outlined text-sm text-[#43474E]">expand_more</span>
            </button>

            @if (userDropdownOpen) {
              <div class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-[#E5E9EB] py-1 z-50">
                <div class="px-4 py-2 border-b border-[#E5E9EB]">
                  <p class="text-sm font-semibold text-[#1A365D] truncate">{{ auth.name() }}</p>
                  <p class="text-xs text-[#43474E] truncate">{{ auth.email() }}</p>
                </div>
                <a routerLink="/account/orders" (click)="userDropdownOpen = false" class="flex items-center gap-2 px-4 py-2 text-sm text-[#43474E] hover:bg-[#F0F4F8] hover:text-[#1A365D]">
                  <span class="material-symbols-outlined text-base">shopping_bag</span>
                  My Orders
                </a>
                <a routerLink="/account/profile" (click)="userDropdownOpen = false" class="flex items-center gap-2 px-4 py-2 text-sm text-[#43474E] hover:bg-[#F0F4F8] hover:text-[#1A365D]">
                  <span class="material-symbols-outlined text-base">person</span>
                  Profile
                </a>
                <button
                  (click)="auth.logout(); userDropdownOpen = false"
                  class="w-full flex items-center gap-2 px-4 py-2 text-sm text-red-500 hover:bg-red-50"
                >
                  <span class="material-symbols-outlined text-base">logout</span>
                  Logout
                </button>
              </div>
            }
          </div>
        } @else {
          <a
            routerLink="/login"
            class="flex items-center gap-1.5 bg-[#1A365D] text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-[#162d4f] transition-colors"
          >
            <span class="material-symbols-outlined text-base">login</span>
            Login
          </a>
        }
      </div>
    </div>

    <!-- Mobile Search -->
    <app-search-box class="w-full lg:hidden mt-3" />
  </div>

  <!-- Mobile Nav Menu — slides below header, outside flex flow -->
  @if (mobileMenuOpen) {
    <div class="lg:hidden bg-[#F8FAFC] border-t border-[#E5E9EB] px-4 py-3 shadow-md">
      <ul class="flex flex-col gap-1 text-sm text-[#43474E]">
        <li>
          <a
            routerLink="/"
            (click)="mobileMenuOpen = false"
            class="block px-3 py-2 rounded hover:bg-[#F0F4F8] hover:text-[#1A365D]"
            >Home</a
          >
        </li>
        <li>
          <a
            routerLink="/become-a-seller"
            (click)="mobileMenuOpen = false"
            class="block px-3 py-2 rounded hover:bg-[#F0F4F8] hover:text-[#1A365D]"
            >Become a Seller</a
          >
        </li>
        <li>
          <a
            routerLink="/aboutus"
            (click)="mobileMenuOpen = false"
            class="block px-3 py-2 rounded hover:bg-[#F0F4F8] hover:text-[#1A365D]"
            >About Us</a
          >
        </li>
        <li>
          <a
            routerLink="/contactus"
            (click)="mobileMenuOpen = false"
            class="block px-3 py-2 rounded hover:bg-[#F0F4F8] hover:text-[#1A365D]"
            >Contact Us</a
          >
        </li>
      </ul>
    </div>
  }
</header>
